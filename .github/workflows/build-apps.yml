name: Build Apps

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run weekly on Tuesday at 9 AM
    - cron: '0 9 * * 2'

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make build script executable
      run: chmod +x scripts/build_apps.sh
      
    - name: Build Android app
      run: |
        echo "🔨 Building Android app..."
        ./scripts/build_apps.sh --android
        
    - name: Upload Android APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: |
          build/test-apks/*.apk
          androidApp/build/outputs/apk/debug/*.apk

  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make build script executable
      run: chmod +x scripts/build_apps.sh
      
    - name: Build iOS app
      run: |
        echo "🍏 Building iOS app..."
        ./scripts/build_apps.sh --ios
        
    - name: Upload iOS app artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ios-app
        path: |
          build/ios-derived-data/Build/Products/Debug-iphonesimulator/*.app

  summary:
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Build status summary
      run: |
        echo "## 📊 Build Apps Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **All apps built successfully using build_apps.sh script!**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Build Components:" >> $GITHUB_STEP_SUMMARY
        echo "- **Android**: ✅ Built using \`./scripts/build_apps.sh --android\`" >> $GITHUB_STEP_SUMMARY
        echo "- **iOS**: ✅ Built using \`./scripts/build_apps.sh --ios\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts Available:" >> $GITHUB_STEP_SUMMARY
        echo "1. Android APK in 'android-apk' artifact" >> $GITHUB_STEP_SUMMARY
        echo "2. iOS app bundle in 'ios-app' artifact" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Script Usage:" >> $GITHUB_STEP_SUMMARY
        echo "```bash" >> $GITHUB_STEP_SUMMARY
        echo "# Build Android only" >> $GITHUB_STEP_SUMMARY
        echo "./scripts/build_apps.sh --android" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "# Build iOS only" >> $GITHUB_STEP_SUMMARY
        echo "./scripts/build_apps.sh --ios" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "# Build both platforms" >> $GITHUB_STEP_SUMMARY
        echo "./scripts/build_apps.sh --all" >> $GITHUB_STEP_SUMMARY
        echo "```" >> $GITHUB_STEP_SUMMARY